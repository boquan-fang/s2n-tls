---
name: Windows Benchmarks

# Runs the handshake benchmark on Windows (mingw64) and publishes the results
# as a readable log summary and a downloadable artifact. This is a
# data-gathering pass: results are not emitted to CloudWatch yet.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  windows-handshake-bench:
    runs-on: windows-latest
    name: Handshake Benchmark (mingw64)
    env:
      # msys2 ships clang, not gcc, but cc-rs defaults to gcc for *-gnu.
      CC: clang
      CXX: clang++
    steps:
      - uses: actions/checkout@v7

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: mingw64
          update: true
          install: >-
            mingw-w64-x86_64-clang
            mingw-w64-x86_64-clang-libs
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-go
            mingw-w64-x86_64-nasm
            mingw-w64-x86_64-rustup
            make
            git
            diffutils
            jq

      - name: Install Rust toolchain
        shell: msys2 {0}
        run: |
          set -eu
          # Force the MinGW gnu host; otherwise rustup picks the runner's MSVC
          # host, which can't build build.rs's GCC/Clang flags.
          rustup set default-host x86_64-pc-windows-gnu
          rustup default stable-x86_64-pc-windows-gnu

      # openssl-src doesn't pass `-j` to make on Windows, so the vendored OpenSSL
      # build runs single-threaded. Export MAKEFLAGS so make parallelizes,
      # which speeds up the vendored OpenSSL build.
      - name: Enable parallel make for vendored OpenSSL
        shell: msys2 {0}
        run: echo "MAKEFLAGS=-j$(nproc)" >> "$GITHUB_ENV"

      - name: Generate Rust bindings
        shell: msys2 {0}
        run: |
          set -eu
          ./bindings/rust/extended/generate.sh --skip-tests

      # Use plain `cargo bench` rather than `cargo criterion`. cargo-criterion
      # streams results from the benchmark process over a local TCP socket, which
      # Windows forcibly resets at the end of the run (os error 10054), failing
      # the step even though the benchmark completed. Plain criterion has no
      # socket; it writes results to target/criterion/**/estimates.json, which
      # the summary step below reads.
      - name: Run handshake benchmark
        shell: msys2 {0}
        working-directory: bindings/rust/standard/benchmarks
        run: |
          set -eu
          cargo bench --bench handshake

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # Produce a human-readable summary of the benchmark results so they can be
      # read directly from the workflow logs and downloaded as an artifact,
      # without needing CloudWatch access.
      - name: Summarize benchmark results
        shell: bash
        run: |
          set -eu
          python - <<'EOF'
          import json
          import os

          criterion_dir = "bindings/rust/standard/target/criterion"
          summary_path = "bindings/rust/standard/benchmarks/criterion_summary.csv"

          rows = []
          # Criterion writes each result to <group>/<function>/new/estimates.json
          # (times in ns), with the human-readable id in the sibling benchmark.json.
          for dirpath, _dirnames, filenames in os.walk(criterion_dir):
              if os.path.basename(dirpath) != "new" or "estimates.json" not in filenames:
                  continue
              with open(os.path.join(dirpath, "estimates.json")) as f:
                  estimates = json.load(f)
              mean_ns = estimates["mean"]["point_estimate"]
              mean_us = mean_ns / 1_000

              full_id = os.path.relpath(os.path.dirname(dirpath), criterion_dir)
              bench_json = os.path.join(dirpath, "benchmark.json")
              if os.path.exists(bench_json):
                  with open(bench_json) as f:
                      full_id = json.load(f).get("full_id", full_id)

              group, _, category = full_id.partition("/")
              rows.append((group, category, mean_us))

          rows.sort()

          header = f"{'Benchmark':40} {'Library':12} {'Mean (us)':>12}"
          print(header)
          print("-" * len(header))
          for group, category, mean_us in rows:
              print(f"{group:40} {category:12} {mean_us:12.3f}")

          with open(summary_path, "w") as out:
              out.write("benchmark,library,mean_us\n")
              for group, category, mean_us in rows:
                  out.write(f"{group},{category},{mean_us:.3f}\n")

          print(f"\nWrote {len(rows)} results to {summary_path}")
          EOF

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: windows-handshake-bench-mingw64
          path: |
            bindings/rust/standard/benchmarks/criterion_summary.csv
            bindings/rust/standard/target/criterion
          if-no-files-found: warn
